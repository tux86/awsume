name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ssomatic-linux-x64
          - os: ubuntu-24.04-arm
            artifact: ssomatic-linux-arm64
          - os: macos-14
            artifact: ssomatic-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        env:
          HUSKY: "0"

      - name: Build
        run: bun run build

      - name: Rename binary
        run: mv dist/ssomatic dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        env:
          HUSKY: "0"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Prepare binaries
        run: |
          mv dist/ssomatic-linux-x64/ssomatic-linux-x64 dist/ssomatic-linux-x64.bin
          mv dist/ssomatic-linux-arm64/ssomatic-linux-arm64 dist/ssomatic-linux-arm64.bin
          mv dist/ssomatic-darwin-arm64/ssomatic-darwin-arm64 dist/ssomatic-darwin-arm64.bin
          chmod +x dist/*.bin
          rm -rf dist/ssomatic-linux-x64 dist/ssomatic-linux-arm64 dist/ssomatic-darwin-arm64
          ls -lh dist/*.bin

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          HUSKY: "0"
