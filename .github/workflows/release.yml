name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      released: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        env:
          HUSKY: "0"

      - name: Run semantic-release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          HUSKY: "0"

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: release
    if: needs.release.outputs.released == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ssomatic-linux-x64
          - os: ubuntu-24.04-arm
            artifact: ssomatic-linux-arm64
          - os: macos-14
            artifact: ssomatic-darwin-arm64

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest (includes version bump)
        run: git pull origin main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        env:
          HUSKY: "0"

      - name: Verify version
        run: echo "Building v$(node -p "require('./package.json').version")"

      - name: Build
        run: bun run build

      - name: Rename binary
        run: mv dist/ssomatic dist/${{ matrix.artifact }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: gh release upload "v${VERSION}" dist/${{ matrix.artifact }} --clobber

  update-homebrew:
    name: Update Homebrew
    runs-on: ubuntu-latest
    needs: [release, build]
    if: needs.release.outputs.released == 'true'

    steps:
      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          echo "Updating Homebrew formula to v${VERSION}"

          gh release download "v${VERSION}" --repo tux86/ssomatic --dir /tmp/bins
          SHA_DARWIN_ARM64=$(sha256sum /tmp/bins/ssomatic-darwin-arm64 | cut -d' ' -f1)
          SHA_LINUX_X64=$(sha256sum /tmp/bins/ssomatic-linux-x64 | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(sha256sum /tmp/bins/ssomatic-linux-arm64 | cut -d' ' -f1)

          git clone "https://x-access-token:${GH_TOKEN}@github.com/tux86/homebrew-tap.git" /tmp/tap
          cd /tmp/tap

          cat > Formula/ssomatic.rb << FORMULA
          class Ssomatic < Formula
            desc "Interactive AWS SSO credential manager with CLI and web UI"
            homepage "https://github.com/tux86/ssomatic"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/tux86/ssomatic/releases/download/v#{version}/ssomatic-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/tux86/ssomatic/releases/download/v#{version}/ssomatic-linux-x64"
                sha256 "${SHA_LINUX_X64}"
              end
              on_arm do
                url "https://github.com/tux86/ssomatic/releases/download/v#{version}/ssomatic-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              end
            end

            def install
              binary = Dir["ssomatic-*"].first
              bin.install binary => "ssomatic"
            end

            test do
              assert_match "ssomatic", shell_output("#{bin}/ssomatic --version")
            end
          end
          FORMULA

          sed -i 's/^          //' Formula/ssomatic.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ssomatic.rb
          git commit -m "chore: update ssomatic to v${VERSION}"
          git push
